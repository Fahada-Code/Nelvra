name: Backend Tests

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nelvra
          POSTGRES_PASSWORD: nelvra
          POSTGRES_DB: nelvra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://nelvra:nelvra@localhost:5432/nelvra
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nelvra:nelvra@localhost:5432/nelvra
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: development
          JWT_SECRET: ci-test-secret
          INTERNAL_SECRET: ci-internal-secret
        run: pytest --cov=api --cov-report=term-missing --cov-fail-under=70 -v

      - name: Lint
        run: |
          ruff check api/ workers/
          black --check api/ workers/
