[tool.pytest.ini_options]
asyncio_mode = "auto"
# Run session-scoped DB fixtures and the tests on the same event loop. Without
# this, asyncpg connections opened in session fixtures fail with "attached to a
# different loop" when used inside function-scoped tests.
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
# Alembic generates migrations with its own boilerplate style; don't lint them.
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.black]
line-length = 100
target-version = ["py311"]
